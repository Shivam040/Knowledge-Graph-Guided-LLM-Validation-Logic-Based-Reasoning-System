chunking:
  window_words: 350
  overlap_words: 50
  min_chunk_words: 120
  chapter_regex: "(?im)^(chapter|chapitre)\\b.*$"

retrieval:
  k: 12
  candidate_pool: 80
  max_per_chapter: 12
  enforce_buckets: False
  backend: "bm25"

verifier:
  backend: "mnli"
  model_name: "MoritzLaurer/DeBERTa-v3-base-mnli-fever-anli"
  batch_size: 16
  max_length: 512
  device: "cuda:0"          # or "cuda:0" if GPU is available
  score_mix_alpha: 0.15

  sentence_level: true
  top_sentences: 5

  entail_threshold: 0.52   # slightly lower = more SUPPORT (but watch false positives)
  contra_threshold: 0.78
  nli_margin: 0.04

  enable_alias_gate: false
  enable_contra_alias_gate: true
  emit_supports_claim_fallback: true

  min_fact_conf: 0.40

kg:
  min_fact_conf: 0.65

aggregation:
  contradiction_penalty: 2.0

